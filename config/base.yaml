# Non-secret defaults, committed. Secrets/overrides come from env (SAM_*).
env: local
log_level: INFO
log_json: true

db:
  host: localhost
  port: 5432
  user: sam
  name: sam

# NLP enrichment (Phase 4). Model ids are stamped on every row they produce.
# device: "cpu" or "cuda" (SAM_NLP__DEVICE=cuda to opt in).
nlp:
  sentiment_model: ProsusAI/finbert
  embedding_model: sentence-transformers/all-MiniLM-L6-v2
  device: cpu
  batch_size: 32
  topics_min_docs: 50

# SAI computation (Phase 5). Any change here alters signal values — run
# `sam sai --rebuild` afterwards (see docs/sai_methodology.md).
signals:
  window_days: 7
  min_history_days: 3
  max_doc_age_days: 7
  weight_mentions: 0.25
  weight_sentiment: 0.25
  weight_topics: 0.25
  weight_engagement: 0.25

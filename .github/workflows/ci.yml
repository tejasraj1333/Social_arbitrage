name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.11"
      - name: Set up Python
        run: uv python install 3.11
      - name: Sync deps
        run: uv sync --extra dev --extra ingestion
      - name: Ruff lint
        run: uv run ruff check src tests
      - name: Ruff format check
        run: uv run ruff format --check src tests
      - name: mypy
        run: uv run mypy src
      - name: Tests
        run: uv run pytest
